# Configuración de Netlify para sitio estático (sin build)
[build]
  publish = "."

# Cabeceras de seguridad y caché
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cachear la imagen del hero (no cambia a menudo)
[[headers]]
  for = "/robotPerfecto.png"
  [headers.values]
    Cache-Control = "public, max-age=2592000"
